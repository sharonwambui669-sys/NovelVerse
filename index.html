<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"content="width=device-width,initial-scale=1.0">
        <title>NovelVerse</title>
        <link rel="stylesheet"href="styles.css">
    <body>

        <header>
            <div class="logo">
                <h1>NovelVerse</h1>
            </div>

            <nav>
                <ul>
                
                    <li><a  href="#home">Home</a></li>
                        <li><a href="#genres">Genres</a></li>
                            <li><a href="#books">Books</a></li>
                                <li><a href="#authors">Authors</a></li>
                                    <li><a href="#reviews">Reviews</a></li>
                                        <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>

            <button id="theme-toggle">Dark Mode</button>
        </header>

        <!--Hero Section-->
        <section id="home"class="hero">
            <div class="hero-text">
               <h2>Discover Amazing Stories</h2>
               <p>
                Explore thousands of novels from different 
             genres.
              Find stories that match your interests and reading mood.
             </p>

             <input type="text" placeholder="Search books here...">
             <button>Search</button>
            </div>
        </section>

        <!--Featured Books-->
        <section class="featured-books">
            <h2>Featured Books</h2>
            
            <div class="book-container">
                <div class="book-card">
                    <img src="images/novel4.jpg"alt="Fantasy Book">
                    
                </div>

            </div>
        </section>

    </body>

</head>

</html>
