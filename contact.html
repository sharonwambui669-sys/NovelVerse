<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact | NovelVerse</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

        <header>
            <div class="logo">
                <h1>NovelVerse</h1>
            </div>

            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="genres.html">Genres</a></li>
                    <li><a href="books.html">Books</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

            <button id="theme-toggle">Dark Mode</button>
        </header>

        <main>
            <section id="contact">
                <div class="contact-container">
                    <h2>Contact Us</h2>
                    <p>Have questions? We'd love to hear from you.</p>

                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <label for="full-name">Full Name</label>
                            <input type="text" id="full-name" name="full_name" placeholder="Enter your full name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email_address" placeholder="Enter your email" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone_number" placeholder="Enter your phone number">
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" placeholder="Write your message here" required></textarea>
                        </div>

                        <button type="submit" class="btn-submit">Submit</button>
                    </form>
                </div>
            </section>

            <section class="newsletter">
                <h2>Subscribe to our newsletter</h2>
                <p>Stay updated with the latest releases and author news.</p>

                <form id="newsletterForm">
                    <input type="email" placeholder="Enter your email" required>
                    <button type="submit">Subscribe</button>
                </form>
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
